services:
  postgres:
    image: postgres:16
    container_name: hr-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
